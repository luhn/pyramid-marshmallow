name: Tests

on:
  push:
    branches:
      - main
      - staging
  pull_request: {}
  workflow_call: {}

jobs:
  test:
    strategy:
      matrix:
        py:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.15.0-beta.1"
          - "pypy3.9"
          - "pypy3.10"
          - "pypy3.11"
        pyramid_version:
          - "1.x"
          - "2.x"

    name: "Python: ${{ matrix.py }}, Pyramid: ${{ matrix.pyramid_version }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.py }}
      - name: Install
        run: |
          if [[ "${{ matrix.pyramid_version }}" == "1.x" ]]; then
            EXTRAS="pyramid<2 setuptools<82"
          else
            EXTRAS="pyramid>=2"
          fi
          pip install .[testing] $EXTRAS
      - name: Running tests
        run: pytest tests -v

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v6
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install
        run: pip install .[linting]
      - name: Lint
        run: ruff check pyramid_marshmallow tests
      - name: Format
        run: ruff format --check pyramid_marshmallow tests
